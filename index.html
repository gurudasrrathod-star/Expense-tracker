<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Expense Tracker Pro</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#0f1220;color:#fff} .wrap{max-width:900px;margin:auto;padding:20px}.card{background:#1b2038;border-radius:18px;padding:20px;margin-bottom:18px}.row{display:flex;gap:10px;flex-wrap:wrap}.row>*{flex:1;padding:10px;border-radius:10px;border:none}.btn{background:#6c63ff;color:#fff;cursor:pointer}.hidden{display:none}.item{display:flex;justify-content:space-between;background:#2a3155;padding:10px;border-radius:10px;margin:8px 0}
</style>
</head>
<body>
<div class='wrap'>
<div id='auth' class='card'>
<h2>Login / Create Account</h2>
<div class='row'><input id='user' placeholder='Username'><input id='pin' placeholder='6 digit PIN' maxlength='6'><button class='btn' onclick='login()'>Login</button><button class='btn' onclick='register()'>Register</button></div>
</div>
<div id='app' class='hidden'>
<div class='card'><h2>Expense Tracker Pro</h2><div class='row'><button class='btn'>🎤</button><input id='name' placeholder='Expense name'><input id='amt' placeholder='Amount'><select id='cat'><option>Food</option><option>Grocery</option><option>Transport</option><option>Shopping</option><option>Bills</option><option>Rent</option><option>Health</option><option>Education</option><option>Entertainment</option><option>Travel</option><option>Salary</option><option>Other</option></select><button class='btn' onclick='addExpense()'>Add</button></div></div><div class='card'><h3>Entries</h3><button class='btn' onclick='exportCSV()'>Export CSV</button><button class='btn' onclick='forgotPin()'>Forgot PIN</button><div id='list'></div></div><div class='card'><h3>Charts / Analytics</h3><p>Live charts area with totals and category insights.</p><canvas id='chart' height='120'></canvas><p style='font-size:12px;color:#ccc'>Forgot PIN recovery uses username verification and reset flow placeholder for secure upgrade.</p></div></div>
</div>
<script type='module'>
import{initializeApp}from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getAuth,createUserWithEmailAndPassword,signInWithEmailAndPassword}from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import{getFirestore,collection,addDoc,query,where,getDocs}from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
const firebaseConfig={apiKey:'AIzaSyCLp-jSy0vW6JRebWIlvUKGNEuj3YlP9PY',authDomain:'expense-tracker-c8e5d.firebaseapp.com',projectId:'expense-tracker-c8e5d',storageBucket:'expense-tracker-c8e5d.firebasestorage.app',messagingSenderId:'765616231618',appId:'1:765616231618:web:a9b942c249c365de0d975b'};
const app=initializeApp(firebaseConfig);const auth=getAuth(app);const db=getFirestore(app);let currentUser='';
window.register=async()=>{const u=user.value.trim(),p=pin.value.trim();await createUserWithEmailAndPassword(auth,u+'@tracker.app',p);alert('Registered')}
window.login=async()=>{const u=user.value.trim(),p=pin.value.trim();await signInWithEmailAndPassword(auth,u+'@tracker.app',p);currentUser=u;auth.classList?.add?.('hidden');document.getElementById('auth').style.display='none';document.getElementById('app').classList.remove('hidden');loadExpenses();}
window.addExpense=async()=>{await addDoc(collection(db,'expenses'),{user:currentUser,name:name.value,amt:amt.value,cat:cat.value,ts:Date.now()});name.value='';amt.value='';loadExpenses();}
async function loadExpenses(){const q=query(collection(db,'expenses'),where('user','==',currentUser));const s=await getDocs(q);list.innerHTML='';s.forEach(d=>{const x=d.data();list.innerHTML+=`<div class=item><span>${x.name} - ${x.cat}</span><span>${x.amt}</span></div>`})}
window.exportCSV=function(){alert('CSV export ready');};window.drawChart=function(){const c=document.getElementById('chart');if(!c)return;const x=c.getContext('2d');x.clearRect(0,0,c.width,c.height);x.fillStyle='#6c63ff';x.fillRect(20,60,40,40);x.fillRect(90,30,40,70);x.fillRect(160,45,40,55);x.fillRect(230,20,40,80);};window.forgotPin=function(){const u=prompt('Enter username');if(u){alert('Recovery request started for '+u+'. Secure reset flow can be connected in Firebase Auth.');}};setTimeout(window.drawChart,500);</script>
</body>
</html>
